[phases.setup]
nixPkgs = [
  "nodejs_20",
  "python311",
  "python311Packages.pip"
]

aptPkgs = [
  "poppler-utils",
  "tesseract-ocr"
]

[phases.install]
cmds = [
  "npm ci || npm install",
  "python3 -m venv .venv",
  ". .venv/bin/activate && pip install -r requirements.txt"
]

[start]
cmd = ". .venv/bin/activate && node server.js"