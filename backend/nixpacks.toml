[phases.setup]
# Only Node comes from nix now. Python is deliberately taken from apt
# instead of nixPkgs — see note below.
nixPkgs = ["nodejs_20"]

aptPkgs = [
  "poppler-utils",
  "tesseract-ocr",
  "python3",
  "python3-venv",
  "python3-pip",
  "libstdc++6"
]

# WHY APT PYTHON, NOT nixPkgs "python311":
# Nix-built Python links against Nix's OWN glibc/libstdc++, via a patched
# ELF loader that ignores /etc/ld.so.cache. pip-installed C-extension
# wheels (numpy, onnxruntime, etc.) are built as "manylinux" wheels,
# which assume a completely standard system glibc/libstdc++ resolved the
# normal way. Mixing the two either fails outright (libstdc++.so.6: not
# found) or, if you force LD_LIBRARY_PATH to bridge them, corrupts the
# process (glibc vDSO mismatch -> "__vdso_gettimeofday: invalid mode for
# dlopen()"). Using apt's python3 sidesteps the whole problem: it's a
# normal Debian binary, linked normally, and apt's libstdc++6 satisfies
# it with no extra configuration.

[phases.install]
cmds = [
  "npm ci || npm install",
  "python3 -m venv .venv",
  ". .venv/bin/activate && pip install --upgrade pip && pip install -r requirements.txt",
  # Fail the BUILD loudly if the OCR/parsing deps can't actually import,
  # instead of deploying a service that silently 500s on every upload.
  ". .venv/bin/activate && python -c \"import numpy, pdfplumber, pdf2image, pytesseract, PIL; print('OCR pipeline deps import OK — numpy', numpy.__version__)\""
]

[start]
cmd = "export PATH=/app/.venv/bin:$PATH && node server.js"